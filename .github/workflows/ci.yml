name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (with dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  self-scan:
    name: Self-scan (report artifact)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run self-scan
        # Scan this repo and emit a standalone JSON report. --no-report keeps it
        # out of dashboard/data; the result is published as a build artifact only,
        # never committed back to the repo.
        run: python -m vulnscan.cli scan . --no-color --no-report --json self-scan-report.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: self-scan-report
          path: self-scan-report.json
          if-no-files-found: error
